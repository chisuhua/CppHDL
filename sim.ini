; CppHDL Simulator Configuration
; 用于控制仿真器的各种行为选项

[progress]
; 进度报告设置
enabled = 1                    ; 启用进度报告 (0=禁用, 1=启用)
interval = 1000                ; 报告间隔 (每N个tick报告一次)
show_percentage = 1            ; 显示完成百分比
show_eta = 1                   ; 显示预计剩余时间
show_rate = 1                  ; 显示仿真速率 (ticks/秒)

[timeout]
; 超时设置
max_ticks = 100000             ; 最大tick数 (0=禁用)
warn_ticks = 50000             ; 警告tick数
exit_on_timeout = 1            ; 超时后退出 (0=禁用, 1=启用)

[logging]
; 日志设置
level = warning                ; 日志级别: debug, info, warning, error
log_eval_details = 0           ; 记录eval详细信息 (0=禁用, 1=启用)
log_signal_changes = 0          ; 记录信号变化 (0=禁用, 1=启用)

[trace]
; 跟踪设置 (如果trace.ini存在)
; trace_on = 1                  ; 全局跟踪开关 (覆盖trace.ini)
; trace_reg = 1                 ; 跟踪寄存器
; trace_tap = 1                 ; 跟踪TAP信号
; trace_input = 1               ; 跟踪输入
; trace_output = 1              ; 跟踪输出
; trace_clock = 1                ; 跟踪时钟
; trace_reset = 1                ; 跟踪复位
